# Alembic configuration. The database URL is taken from the DATABASE_URL
# environment variable at runtime (see alembic/env.py), so the value below is
# only a placeholder for offline tooling.
[alembic]
script_location = alembic
prepend_sys_path = .
# placeholder; the real URL comes from DATABASE_URL via env.py
sqlalchemy.url = sqlite:///tcg_dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
