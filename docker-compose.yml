# Local stack: dockerized Postgres + FastAPI backend + nginx-served frontend.
# Usage:  docker compose up --build   then open http://localhost:5173
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tcg
      POSTGRES_PASSWORD: tcg
      POSTGRES_DB: tcg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcg"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://tcg:tcg@db:5432/tcg
      JWT_SECRET: change-me-in-prod
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: steeleschauer@gmail.com
      ADMIN_PASSWORD: tmppassword
      # POKEMONTCG_API_KEY: ""   # optional, raises card API rate limits
    ports:
      - "8000:8000"
    volumes:
      - ./backend/checkpoints:/app/checkpoints   # serve trained RL policy
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      API_BASE: http://localhost:8000   # browser-side URL of the backend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
