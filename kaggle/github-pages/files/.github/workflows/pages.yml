name: Deploy frontend to GitHub Pages

# Publishes the React/Vite frontend as a static site on GitHub Pages.
#
# NOTE: Pages hosts the FRONTEND ONLY. The app needs the FastAPI backend, so set
# a repository Variable named VITE_API_BASE to your deployed backend's HTTPS URL
# (e.g. https://tcg-backend.onrender.com) under:
#   Settings → Secrets and variables → Actions → Variables → New repository variable
# Also enable Pages with source "GitHub Actions": Settings → Pages → Build and deployment → Source.

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          # Served from https://<user>.github.io/AI-PTCG/ — must match the repo name.
          # Change this if you rename the repo or use a custom domain (then use "/").
          VITE_BASE: /AI-PTCG/
          # Your deployed backend URL (repo Variable). Empty ⇒ UI builds but API calls fail.
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build
      - name: SPA fallback (serve index.html on unknown paths)
        run: cp frontend/dist/index.html frontend/dist/404.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
