name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend · engine + API (Robot)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tcg
          POSTGRES_PASSWORD: tcg
          POSTGRES_DB: tcg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tcg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://tcg:tcg@localhost:5432/tcg
      JWT_SECRET: ci-secret
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: steeleschauer@gmail.com
      ADMIN_PASSWORD: tmppassword
      TCG_BASE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (CPU PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r backend/requirements.txt
          pip install -r tests/requirements.txt

      - name: Engine self-play smoke test
        working-directory: backend
        run: python smoke_test.py 20

      - name: Start API server
        working-directory: backend
        run: |
          nohup uvicorn api.main:app --host 0.0.0.0 --port 8000 > /tmp/api.log 2>&1 &
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/api/health > /dev/null; then
              echo "API is up"; exit 0
            fi
            sleep 1
          done
          echo "API failed to start"; cat /tmp/api.log; exit 1

      - name: Run Robot Framework acceptance tests
        run: robot --outputdir tests/results tests/

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: tests/results

      - name: Dump API log on failure
        if: failure()
        run: cat /tmp/api.log || true

  frontend:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
